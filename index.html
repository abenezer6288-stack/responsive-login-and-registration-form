<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">
   <link rel="stylesheet" href="assets/css/styles.css">
   <title>Login — Modern</title>
</head>
<body>

   <!-- Animated background particles -->
   <div class="bg-particles" id="bgParticles"></div>

   <!-- Floating orbs -->
   <div class="orb orb--1"></div>
   <div class="orb orb--2"></div>
   <div class="orb orb--3"></div>

   <div class="login container" id="loginAccessRegister">

      <!-- Left panel: branding -->
      <div class="login__panel">
         <div class="login__panel-content">
            <div class="login__logo">
               <i class="ri-shield-keyhole-fill"></i>
            </div>
            <h2 class="login__panel-title">Welcome Back</h2>
            <p class="login__panel-text">Sign in to continue your journey. Your world awaits.</p>
            <div class="login__panel-dots">
               <span class="dot dot--active"></span>
               <span class="dot"></span>
               <span class="dot"></span>
            </div>
         </div>
      </div>

      <!-- Right panel: forms -->
      <div class="login__forms">

         <!--===== LOGIN ACCESS =====-->
         <div class="login__access">
            <h1 class="login__title">Sign <span>In</span></h1>
            <p class="login__subtitle">Enter your credentials to access your account</p>

            <form action="" class="login__form">
               <div class="login__content">

                  <div class="login__box">
                     <i class="ri-mail-line login__icon"></i>
                     <input type="email" id="email" required placeholder=" " class="login__input">
                     <label for="email" class="login__label">Email address</label>
                     <span class="login__box-line"></span>
                  </div>

                  <div class="login__box">
                     <i class="ri-lock-line login__icon"></i>
                     <input type="password" id="password" required placeholder=" " class="login__input">
                     <label for="password" class="login__label">Password</label>
                     <i class="ri-eye-off-line login__icon login__password login__icon--right" id="loginPassword"></i>
                     <span class="login__box-line"></span>
                  </div>

               </div>

               <a href="#" class="login__forgot">Forgot password?</a>

               <button type="submit" class="login__button">
                  <span>Sign In</span>
                  <i class="ri-arrow-right-line"></i>
               </button>
            </form>

            <div class="login__divider"><span>or continue with</span></div>

            <div class="login__social-links">
               <a href="#" class="login__social-link">
                  <img src="assets/img/icon-google.svg" alt="Google">
                  <span>Google</span>
               </a>
               <a href="#" class="login__social-link">
                  <img src="assets/img/icon-facebook.svg" alt="Facebook">
                  <span>Facebook</span>
               </a>
               <a href="#" class="login__social-link">
                  <img src="assets/img/icon-apple.svg" alt="Apple">
                  <span>Apple</span>
               </a>
            </div>

            <p class="login__switch">
               No account yet?
               <button id="loginButtonRegister">Create one</button>
            </p>
         </div>

         <!--===== LOGIN REGISTER =====-->
         <div class="login__register">
            <h1 class="login__title">Sign <span>Up</span></h1>
            <p class="login__subtitle">Create your account and get started today</p>

            <form action="" class="login__form">
               <div class="login__content">

                  <div class="login__group">
                     <div class="login__box">
                        <i class="ri-user-line login__icon"></i>
                        <input type="text" id="names" required placeholder=" " class="login__input">
                        <label for="names" class="login__label">First name</label>
                        <span class="login__box-line"></span>
                     </div>
                     <div class="login__box">
                        <i class="ri-user-line login__icon"></i>
                        <input type="text" id="surnames" required placeholder=" " class="login__input">
                        <label for="surnames" class="login__label">Last name</label>
                        <span class="login__box-line"></span>
                     </div>
                  </div>

                  <div class="login__box">
                     <i class="ri-mail-line login__icon"></i>
                     <input type="email" id="emailCreate" required placeholder=" " class="login__input">
                     <label for="emailCreate" class="login__label">Email address</label>
                     <span class="login__box-line"></span>
                  </div>

                  <div class="login__box">
                     <i class="ri-lock-line login__icon"></i>
                     <input type="password" id="passwordCreate" required placeholder=" " class="login__input">
                     <label for="passwordCreate" class="login__label">Password</label>
                     <i class="ri-eye-off-line login__icon login__password login__icon--right" id="loginPasswordCreate"></i>
                     <span class="login__box-line"></span>
                  </div>

               </div>

               <button type="submit" class="login__button">
                  <span>Create Account</span>
                  <i class="ri-arrow-right-line"></i>
               </button>
            </form>

            <p class="login__switch">
               Already have an account?
               <button id="loginButtonAccess">Sign in</button>
            </p>
         </div>

      </div>
   </div>

   <script src="assets/js/main.js"></script>
</body>
</html>
